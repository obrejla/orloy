<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orloy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #d0d0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      gap: 1.5rem;
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 0.4em;
      color: #c0c0ff;
      text-shadow: 0 0 20px rgba(160,160,255,0.4);
    }

    #status-bar {
      padding: 0.5rem 1.8rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      border: 2px solid #333;
      color: #666;
      transition: all 0.3s;
    }
    #status-bar.IDLE    { border-color: #444; color: #888; }
    #status-bar.RANDOM  { border-color: #4cc9f0; color: #4cc9f0;
                          box-shadow: 0 0 12px rgba(76,201,240,0.3); }
    #status-bar.MANUAL  { border-color: #f72585; color: #f72585;
                          box-shadow: 0 0 12px rgba(247,37,133,0.3); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .btn {
      padding: 1.8rem 1rem;
      border-radius: 14px;
      border: 2px solid #333;
      background: #12122a;
      color: #c0c0e0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
      touch-action: none;
    }
    .btn:active { transform: scale(0.95); }

    /* RANDOM */
    #btn-random { border-color: #4cc9f0; }
    #btn-random.active {
      background: #4cc9f0; color: #0d0d1a;
      box-shadow: 0 0 18px rgba(76,201,240,0.5);
    }

    /* MANUAL */
    #btn-manual { border-color: #f72585; }
    #btn-manual.active {
      background: #f72585; color: #fff;
      box-shadow: 0 0 18px rgba(247,37,133,0.5);
    }

    /* GEARBOX – full width */
    #btn-gearbox {
      grid-column: 1 / -1;
      border-color: #7209b7;
    }
    #btn-gearbox.pressing {
      background: #7209b7; color: #fff;
      box-shadow: 0 0 18px rgba(114,9,183,0.5);
    }

    /* SHUTDOWN – full width with progress bar */
    #btn-shutdown {
      grid-column: 1 / -1;
      border-color: #e63946;
      position: relative;
      overflow: hidden;
    }
    #btn-shutdown .progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 4px;
      width: 0%;
      background: #e63946;
    }
    #btn-shutdown.holding .progress {
      width: 100%;
      transition: width var(--hold-ms) linear;
    }

    /* MOTION – full width */
    #btn-pir { grid-column: 1 / -1; border-color: #f4a261; }
    #btn-pir.active {
      background: #f4a261; color: #0d0d1a;
      box-shadow: 0 0 18px rgba(244,162,97,0.5);
    }

    /* Shared styles for TEAM SOUND and SPEECH sections */
    #audio-section, #speech-section {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #audio-section label, #speech-section label {
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      color: #888;
      text-transform: uppercase;
    }
    #audio-select, #speech-select {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 10px;
      background: #12122a;
      color: #c0c0e0;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    #audio-select  { border: 2px solid #3a86ff; }
    #speech-select { border: 2px solid #06d6a0; }
    #audio-controls, #speech-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    #btn-audio-play  { border-color: #3a86ff; }
    #btn-audio-play.active {
      background: #3a86ff; color: #fff;
      box-shadow: 0 0 18px rgba(58,134,255,0.5);
    }
    #btn-audio-stop  { border-color: #e63946; }
    #btn-audio-stop.active {
      background: #e63946; color: #fff;
      box-shadow: 0 0 18px rgba(230,57,70,0.5);
    }
    #btn-speech-play { border-color: #06d6a0; }
    #btn-speech-play.active {
      background: #06d6a0; color: #0d0d1a;
      box-shadow: 0 0 18px rgba(6,214,160,0.5);
    }
    #btn-speech-stop { border-color: #e63946; }
    #btn-speech-stop.active {
      background: #e63946; color: #fff;
      box-shadow: 0 0 18px rgba(230,57,70,0.5);
    }
    .btn:disabled, #audio-select:disabled, #speech-select:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn:disabled:active { transform: none; }

    .error-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%; transform: translateX(-50%);
      background: #e63946;
      color: #fff;
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .error-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>ORLOY</h1>
  <div id="status-bar" class="IDLE">IDLE</div>

  <div class="grid">
    <button class="btn" id="btn-random">RANDOM</button>
    <button class="btn" id="btn-manual">MANUAL</button>
    <button class="btn" id="btn-gearbox">GEARBOX</button>
    <button class="btn" id="btn-pir">MOTION: OFF</button>
    <div id="audio-section">
      <label>Team Sound</label>
      <select id="audio-select">
        <option value="">-- select track --</option>
      </select>
      <div id="audio-controls">
        <button class="btn" id="btn-audio-play">PLAY</button>
        <button class="btn" id="btn-audio-stop" disabled>STOP</button>
      </div>
    </div>
    <div id="speech-section">
      <label>Speech</label>
      <select id="speech-select">
        <option value="">-- select track --</option>
      </select>
      <div id="speech-controls">
        <button class="btn" id="btn-speech-play">PLAY</button>
        <button class="btn" id="btn-speech-stop" disabled>STOP</button>
      </div>
    </div>
    <button class="btn" id="btn-shutdown"
            style="--hold-ms: 3s;">
      SHUTDOWN (hold 3s)
      <div class="progress" id="shutdown-progress"></div>
    </button>
  </div>

  <div class="error-toast" id="toast">Connection error</div>

  <script>
    const SHUTDOWN_HOLD_MS = 3000;

    // ------------------------------------------------------------------ //
    // Status polling
    // ------------------------------------------------------------------ //

    // Update all audio-related controls for both players at once.
    // Both players share the same mixer, so they are locked together.
    function updateAudioUI(playing) {
      const audioPlay  = document.getElementById('btn-audio-play');
      const audioStop  = document.getElementById('btn-audio-stop');
      const audioSel   = document.getElementById('audio-select');
      const speechPlay = document.getElementById('btn-speech-play');
      const speechStop = document.getElementById('btn-speech-stop');
      const speechSel  = document.getElementById('speech-select');

      audioPlay.disabled  = playing;
      audioSel.disabled   = playing;
      audioStop.disabled  = !playing;
      audioPlay.classList.toggle('active', playing);
      audioStop.classList.toggle('active', playing);

      speechPlay.disabled = playing;
      speechSel.disabled  = playing;
      speechStop.disabled = !playing;
      speechPlay.classList.toggle('active', playing);
      speechStop.classList.toggle('active', playing);
    }

    function updateUI(data) {
      const mode = data.mode;
      const bar = document.getElementById('status-bar');
      bar.textContent = mode;
      bar.className = mode;
      document.getElementById('btn-random').classList.toggle('active', mode === 'RANDOM');
      document.getElementById('btn-manual').classList.toggle('active', mode === 'MANUAL');
      if (data.pir_enabled !== undefined) {
        const pirBtn = document.getElementById('btn-pir');
        pirBtn.classList.toggle('active', data.pir_enabled);
        pirBtn.textContent = 'MOTION: ' + (data.pir_enabled ? 'ON' : 'OFF');
      }
      if (data.audio_playing !== undefined) {
        updateAudioUI(data.audio_playing);
      }
    }

    function showError() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function apiPost(path) {
      try {
        const res = await fetch('/api' + path, { method: 'POST' });
        if (!res.ok) { showError(); return; }
        updateUI(await res.json());
      } catch (_) { showError(); }
    }

    async function pollStatus() {
      try {
        const res = await fetch('/api/status');
        if (res.ok) updateUI(await res.json());
      } catch (_) {}
    }

    setInterval(pollStatus, 2000);
    pollStatus();

    // ------------------------------------------------------------------ //
    // RANDOM / MANUAL – simple toggle on click
    // ------------------------------------------------------------------ //
    document.getElementById('btn-random').addEventListener('click', () => apiPost('/toggle_random'));
    document.getElementById('btn-manual').addEventListener('click', () => apiPost('/toggle_manual'));

    // ------------------------------------------------------------------ //
    // MOTION – toggle PIR detection on click
    // ------------------------------------------------------------------ //
    document.getElementById('btn-pir').addEventListener('click', async () => {
      try {
        const res = await fetch('/api/pir/toggle', { method: 'POST' });
        if (!res.ok) { showError(); return; }
        const data = await res.json();
        const pirBtn = document.getElementById('btn-pir');
        pirBtn.classList.toggle('active', data.pir_enabled);
        pirBtn.textContent = 'MOTION: ' + (data.pir_enabled ? 'ON' : 'OFF');
      } catch (_) { showError(); }
    });

    // ------------------------------------------------------------------ //
    // GEARBOX – HIGH while held, LOW on release
    // ------------------------------------------------------------------ //
    const gearboxBtn = document.getElementById('btn-gearbox');

    function gearboxPress() {
      gearboxBtn.classList.add('pressing');
      fetch('/api/gearbox/on', { method: 'POST' }).catch(() => {});
    }
    function gearboxRelease() {
      gearboxBtn.classList.remove('pressing');
      fetch('/api/gearbox/off', { method: 'POST' }).catch(() => {});
    }

    gearboxBtn.addEventListener('mousedown',  gearboxPress);
    gearboxBtn.addEventListener('mouseup',    gearboxRelease);
    gearboxBtn.addEventListener('mouseleave', gearboxRelease);
    gearboxBtn.addEventListener('touchstart', e => { e.preventDefault(); gearboxPress(); });
    gearboxBtn.addEventListener('touchend',   e => { e.preventDefault(); gearboxRelease(); });
    gearboxBtn.addEventListener('touchcancel',e => { e.preventDefault(); gearboxRelease(); });

    // ------------------------------------------------------------------ //
    // SHUTDOWN – hold for SHUTDOWN_HOLD_MS to trigger
    // ------------------------------------------------------------------ //
    const shutdownBtn  = document.getElementById('btn-shutdown');
    const progressBar  = document.getElementById('shutdown-progress');
    let shutdownTimer  = null;

    function shutdownHoldStart() {
      // reset bar width so transition restarts
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';
      void progressBar.offsetWidth;               // force reflow

      shutdownBtn.classList.add('holding');        // triggers CSS transition

      shutdownTimer = setTimeout(() => {
        shutdownBtn.classList.remove('holding');
        fetch('/api/shutdown', { method: 'POST' }).catch(() => {});
      }, SHUTDOWN_HOLD_MS);
    }

    function shutdownHoldCancel() {
      if (shutdownTimer) { clearTimeout(shutdownTimer); shutdownTimer = null; }
      shutdownBtn.classList.remove('holding');
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';
    }

    shutdownBtn.addEventListener('mousedown',  shutdownHoldStart);
    shutdownBtn.addEventListener('mouseup',    shutdownHoldCancel);
    shutdownBtn.addEventListener('mouseleave', shutdownHoldCancel);
    shutdownBtn.addEventListener('touchstart', e => { e.preventDefault(); shutdownHoldStart(); });
    shutdownBtn.addEventListener('touchend',   e => { e.preventDefault(); shutdownHoldCancel(); });
    shutdownBtn.addEventListener('touchcancel',e => { e.preventDefault(); shutdownHoldCancel(); });

    // ------------------------------------------------------------------ //
    // TEAM SOUND – load tracks on page load, PLAY / STOP
    // ------------------------------------------------------------------ //
    async function loadTracks() {
      try {
        const res = await fetch('/api/teams/tracks');
        if (!res.ok) return;
        const data = await res.json();
        const sel = document.getElementById('audio-select');
        sel.innerHTML = '<option value="">-- select track --</option>';
        (data.tracks || []).forEach(filename => {
          const opt = document.createElement('option');
          opt.value = filename;
          opt.textContent = filename.replace(/\.mp3$/i, '')
                                    .replace(/\b\w/g, c => c.toUpperCase());
          sel.appendChild(opt);
        });
      } catch (_) {}
    }

    document.getElementById('btn-audio-play').addEventListener('click', async () => {
      const filename = document.getElementById('audio-select').value;
      if (!filename) return;
      updateAudioUI(true);   // optimistic: lock controls immediately
      try {
        const res = await fetch('/api/teams/play', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename })
        });
        if (!res.ok) { updateAudioUI(false); showError(); }
      } catch (_) { updateAudioUI(false); showError(); }
    });

    document.getElementById('btn-audio-stop').addEventListener('click', async () => {
      try {
        await fetch('/api/teams/stop', { method: 'POST' });
        updateAudioUI(false);
      } catch (_) {}
    });

    // ------------------------------------------------------------------ //
    // SPEECH – load tracks on page load, PLAY / STOP
    // ------------------------------------------------------------------ //
    async function loadSpeechTracks() {
      try {
        const res = await fetch('/api/speech/tracks');
        if (!res.ok) return;
        const data = await res.json();
        const sel = document.getElementById('speech-select');
        sel.innerHTML = '<option value="">-- select track --</option>';
        (data.tracks || []).forEach(filename => {
          const opt = document.createElement('option');
          opt.value = filename;
          opt.textContent = filename.replace(/\.mp3$/i, '')
                                    .replace(/[-_]/g, ' ')
                                    .replace(/\b\w/g, c => c.toUpperCase());
          sel.appendChild(opt);
        });
      } catch (_) {}
    }

    document.getElementById('btn-speech-play').addEventListener('click', async () => {
      const filename = document.getElementById('speech-select').value;
      if (!filename) return;
      updateAudioUI(true);   // optimistic: lock controls immediately
      try {
        const res = await fetch('/api/speech/play', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename })
        });
        if (!res.ok) { updateAudioUI(false); showError(); }
      } catch (_) { updateAudioUI(false); showError(); }
    });

    document.getElementById('btn-speech-stop').addEventListener('click', async () => {
      try {
        await fetch('/api/speech/stop', { method: 'POST' });
        updateAudioUI(false);
      } catch (_) {}
    });

    loadTracks();
    loadSpeechTracks();
  </script>
</body>
</html>
